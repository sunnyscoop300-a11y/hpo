<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 Veruca — Dark Mage Image Generator</title>
<style>
  :root {
    --bg: #0d0a1a;
    --panel: #1a1430;
    --panel2: #241a42;
    --accent: #a86cff;
    --accent2: #6c4bd6;
    --text: #e8def7;
    --muted: #9a86c4;
    --border: #3a2c5e;
    --danger: #ff6b8a;
    --ok: #6cff9e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(ellipse at top, #1a1030 0%, var(--bg) 70%);
    color: var(--text);
    min-height: 100vh;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }
  header { text-align: center; margin-bottom: 1.8rem; }
  .moon { font-size: 3rem; filter: drop-shadow(0 0 12px var(--accent)); }
  h1 { margin: 0.3rem 0 0.2rem; font-size: 1.8rem; letter-spacing: 1px;
       background: linear-gradient(90deg, #c9a6ff, #8a6cff); -webkit-background-clip: text;
       -webkit-text-fill-color: transparent; }
  .sub { color: var(--muted); font-size: 0.9rem; font-style: italic; }
  .card { background: var(--panel); border: 1px solid var(--border);
          border-radius: 14px; padding: 1.2rem; margin-bottom: 1.2rem;
          box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  .card h2 { margin: 0 0 0.8rem; font-size: 0.95rem; text-transform: uppercase;
             letter-spacing: 1px; color: var(--accent); }
  label { display: block; font-size: 0.82rem; color: var(--muted); margin: 0.6rem 0 0.25rem; }
  input, select, textarea {
    width: 100%; padding: 0.65rem 0.8rem; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-size: 0.95rem; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .row { display: flex; gap: 0.8rem; }
  .row > div { flex: 1; }
  .keyrow { display: flex; gap: 0.5rem; align-items: flex-end; }
  .keyrow > div { flex: 1; }
  button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 8px; padding: 0.75rem 1.2rem;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(168,108,255,0.4); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  button.ghost { background: var(--panel2); border: 1px solid var(--border); }
  .genbtn { width: 100%; padding: 0.9rem; font-size: 1.05rem; margin-top: 0.4rem; }
  .status { text-align: center; font-size: 0.88rem; margin: 0.8rem 0; min-height: 1.2rem; }
  .status.err { color: var(--danger); }
  .status.ok { color: var(--ok); }
  .status.work { color: var(--accent); }
  .result { text-align: center; }
  .result img { max-width: 100%; border-radius: 12px; border: 1px solid var(--border);
                box-shadow: 0 8px 32px rgba(0,0,0,0.5); margin-top: 0.5rem; }
  .dl { margin-top: 0.8rem; display: inline-block; text-decoration: none; }
  .saved-note { font-size: 0.75rem; color: var(--ok); margin-top: 0.3rem; }
  .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.4; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border);
             border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
             vertical-align: middle; margin-right: 0.4rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="moon">🌙</div>
    <h1>VERUCA</h1>
    <div class="sub">The dark mage weaves a higher art</div>
  </header>

  <div class="card">
    <h2>🔑 API Configuration</h2>
    <label>Provider</label>
    <select id="provider">
      <option value="huggingface">Hugging Face (FLUX / SD)</option>
      <option value="stability">Stability AI</option>
      <option value="leonardo">Leonardo AI</option>
      <option value="openai_compat">OpenAI-compatible (DALL·E style)</option>
    </select>

    <div class="keyrow">
      <div>
        <label>API Key (stored locally in your browser only)</label>
        <input type="password" id="apikey" placeholder="paste your API key here" autocomplete="off">
      </div>
      <button class="ghost" id="saveKey">Save</button>
    </div>
    <div class="saved-note" id="savedNote"></div>

    <label>Model (optional — leave blank for provider default)</label>
    <input type="text" id="model" placeholder="e.g. black-forest-labs/FLUX.1-schnell">

    <label id="endpointLabel" style="display:none">Endpoint URL (openai-compatible only)</label>
    <input type="text" id="endpoint" placeholder="https://api.openai.com/v1/images/generations" style="display:none">

    <div class="hint">🔒 Your key never leaves this page except to call the provider directly. It's saved in your browser's localStorage, not on any server.</div>
  </div>

  <div class="card">
    <h2>🎨 Create</h2>
    <label>Prompt</label>
    <textarea id="prompt" placeholder="a baboon musician with glowing sitar, neon synthwave sunset, retro 80s grid, vaporwave album cover"></textarea>
    <button class="genbtn" id="genBtn">🌙 Summon Image</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card result" id="resultCard" style="display:none">
    <h2>🖼️ Result</h2>
    <div id="result"></div>
    <a class="dl" id="dlLink" download="veruca.png"><button>⬇ Download</button></a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const LS_KEY_PREFIX = "veruca_apikey_";

// Show/hide endpoint field for openai_compat
function updateProviderUI() {
  const p = $("provider").value;
  const show = p === "openai_compat";
  $("endpointLabel").style.display = show ? "block" : "none";
  $("endpoint").style.display = show ? "block" : "none";
  // Load stored key for this provider
  const stored = localStorage.getItem(LS_KEY_PREFIX + p);
  $("apikey").value = stored || "";
  $("savedNote").textContent = stored ? "✓ Key loaded for " + p : "";
}
$("provider").addEventListener("change", updateProviderUI);

$("saveKey").addEventListener("click", () => {
  const p = $("provider").value;
  const k = $("apikey").value.trim();
  if (!k) { $("savedNote").textContent = "Nothing to save."; return; }
  localStorage.setItem(LS_KEY_PREFIX + p, k);
  $("savedNote").textContent = "✓ Saved locally for " + p;
});

function setStatus(msg, cls) {
  const s = $("status");
  s.className = "status" + (cls ? " " + cls : "");
  s.innerHTML = cls === "work" ? '<span class="spinner"></span>' + msg : msg;
}

function showResult(blobUrl) {
  $("resultCard").style.display = "block";
  $("result").innerHTML = '<img src="' + blobUrl + '" alt="generated">';
  $("dlLink").href = blobUrl;
  $("resultCard").scrollIntoView({ behavior: "smooth" });
}

async function generate() {
  const provider = $("provider").value;
  const key = $("apikey").value.trim();
  const model = $("model").value.trim();
  const endpoint = $("endpoint").value.trim();
  const prompt = $("prompt").value.trim();

  if (!key) { setStatus("Please enter an API key.", "err"); return; }
  if (!prompt) { setStatus("Please enter a prompt.", "err"); return; }

  $("genBtn").disabled = true;
  setStatus("Summoning the image… this can take 5–30 seconds.", "work");

  try {
    let blob;
    if (provider === "huggingface") {
      blob = await genHuggingFace(key, model, prompt);
    } else if (provider === "stability") {
      blob = await genStability(key, prompt);
    } else if (provider === "leonardo") {
      blob = await genLeonardo(key, model, prompt);
    } else if (provider === "openai_compat") {
      blob = await genOpenAI(key, model, endpoint, prompt);
    }
    const url = URL.createObjectURL(blob);
    showResult(url);
    setStatus("✓ Masterpiece complete!", "ok");
  } catch (e) {
    setStatus("✗ " + e.message, "err");
  } finally {
    $("genBtn").disabled = false;
  }
}

// --- Providers ---

async function genHuggingFace(key, model, prompt) {
  const m = model || "black-forest-labs/FLUX.1-schnell";
  const r = await fetch("https://api-inference.huggingface.co/models/" + m, {
    method: "POST",
    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
    body: JSON.stringify({ inputs: prompt })
  });
  if (!r.ok) throw new Error("HuggingFace " + r.status + ": " + (await r.text()).slice(0, 200));
  return await r.blob();
}

async function genStability(key, prompt) {
  const fd = new FormData();
  fd.append("prompt", prompt);
  fd.append("output_format", "png");
  const r = await fetch("https://api.stability.ai/v2beta/stable-image/generate/core", {
    method: "POST",
    headers: { "Authorization": "Bearer " + key, "Accept": "image/*" },
    body: fd
  });
  if (!r.ok) throw new Error("Stability " + r.status + ": " + (await r.text()).slice(0, 200));
  return await r.blob();
}

async function genLeonardo(key, model, prompt) {
  const modelId = model || "b24e16ff-06e3-43eb-8d33-4416c2d75876";
  const hdr = { "Authorization": "Bearer " + key, "Content-Type": "application/json", "Accept": "application/json" };
  const create = await fetch("https://cloud.leonardo.ai/api/rest/v1/generations", {
    method: "POST", headers: hdr,
    body: JSON.stringify({ prompt, modelId, num_images: 1, width: 1024, height: 1024 })
  });
  if (!create.ok) throw new Error("Leonardo create " + create.status + ": " + (await create.text()).slice(0, 200));
  const genId = (await create.json())?.sdGenerationJob?.generationId;
  if (!genId) throw new Error("Leonardo: no generationId");
  for (let i = 0; i < 40; i++) {
    await new Promise(res => setTimeout(res, 3000));
    const poll = await fetch("https://cloud.leonardo.ai/api/rest/v1/generations/" + genId, { headers: hdr });
    if (!poll.ok) continue;
    const gj = (await poll.json())?.generations_by_pk;
    if (gj?.status === "COMPLETE") {
      const imgUrl = gj.generated_images?.[0]?.url;
      if (!imgUrl) throw new Error("Leonardo: complete but no image");
      const img = await fetch(imgUrl);
      return await img.blob();
    }
  }
  throw new Error("Leonardo: timed out");
}

async function genOpenAI(key, model, endpoint, prompt) {
  const url = endpoint || "https://api.openai.com/v1/images/generations";
  const payload = { prompt, n: 1, size: "1024x1024" };
  if (model) payload.model = model;
  const r = await fetch(url, {
    method: "POST",
    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error("OpenAI-compat " + r.status + ": " + (await r.text()).slice(0, 200));
  const j = await r.json();
  const item = j?.data?.[0];
  if (item?.b64_json) {
    const bin = atob(item.b64_json);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new Blob([arr], { type: "image/png" });
  } else if (item?.url) {
    const img = await fetch(item.url);
    return await img.blob();
  }
  throw new Error("OpenAI-compat: no image in response");
}

$("genBtn").addEventListener("click", generate);
updateProviderUI();
</script>
</body>
</html>
